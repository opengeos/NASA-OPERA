version: 1
project:
  title: NASA OPERA
  subtitle: NASA's Observational Products for End-Users from Remote Sensing Analysis (OPERA)
  # authors:
  #   - name: Author Name
  copyright: '2026'
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - generate_logo.py
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  github: opengeos/NASA-OPERA
  # thebe:
  #   binder:
  #     repo: opengeos/NASA-OPERA
  #     provider: github
  #     url: https://mybinder.org
  #     ref: main
  bibliography:
    - pages/references.bib
  toc:
    - file: index.md
    - file: pages/about.md
    - title: Data Products
      children:
        - file: pages/data/DSWx.md
        - file: pages/data/DIST.md
        - file: pages/data/DISP.md
        - file: pages/data/CSLC.md
        - file: pages/data/RTC.md
    - title: Notebook Examples
      children:
        - file: pages/notebooks/DSWx.md
        - file: pages/notebooks/DIST.md
        - file: pages/notebooks/DISP.md
    - title: Web Apps
      children:
        - file: pages/apps/DSWx.md
        - file: pages/apps/DIST.md
        - file: pages/apps/DISP.md
    - title: QGIS Plugins
      children:
        - file: pages/plugins/OPERA.md
        - file: pages/plugins/Earthdata.md
        - file: pages/plugins/GEE.md
        - file: pages/plugins/Timelapse.md
        - file: pages/plugins/Leafmap.md
    - file: pages/videos.md
    - file: pages/workshops.md
    - file: pages/blog.md
    - file: pages/contact.md
    - pattern: posts/*.md
      hidden: true
site:
  options:
    logo: images/logo.png
    logo_dark: images/logo.png
    favicon: images/fav.ico
    folders: true
    style: custom.css
    analytics_google: G-HLSSQ8JVQZ
  actions:
    - title: RSS
      url: https://opera.opengeos.org/rss.xml
  template: book-theme
  parts:
    primary_sidebar_footer: '![](images/logo_200x.png)'
    footer: |
      [YouTube](https://youtube.com/@giswqs) |
      [GitHub](https://github.com/giswqs) |
      [LinkedIn](https://www.linkedin.com/in/giswqs) |
      [RSS](https://opera.opengeos.org/rss.xml)