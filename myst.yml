version: 1
project:
  title: NASA OPERA
  subtitle: NASA's Observational Products for End-Users from Remote Sensing Analysis (OPERA)
  # authors:
  #   - name: Author Name
  copyright: '2026'
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - generate_logo.py
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  github: opengeos/NASA-OPERA
  thebe:
    binder:
      repo: opengeos/NASA-OPERA
      provider: github
      url: https://mybinder.org
      ref: main
  bibliography:
    - pages/references.bib
  toc:
    - file: index.md
    - file: pages/about.md
    - title: Data Products
      children:
        - file: pages/data/DSWx.md
        - file: pages/data/DIST.md
        - file: pages/data/DISP-S1.md
    - title: Notebook Examples
      children:
        - file: pages/notebooks/DSWx.md
        - file: pages/notebooks/DIST.md
        - file: pages/notebooks/DISP-S1.md
    - title: Web Apps
      children:
        - file: pages/apps/DSWx.md
        - file: pages/apps/DIST.md
        - file: pages/apps/DISP-S1.md
    - title: QGIS Plugins
      children:
        - file: pages/plugins/OPERA.md
        - file: pages/plugins/Leafmap.md
        - file: pages/plugins/GEE.md
    - file: blog.md
      children:
        - file: tags/myst-markdown.md
        - file: tags/tutorial.md
        - file: tags/github-pages.md
    - file: pages/contact.md
    - pattern: posts/*.md
      hidden: true
site:
  options:
    logo: logo.png
    logo_dark: logo.png
    favicon: fav.ico
    folders: true
    style: custom.css
    analytics_google: G-HLSSQ8JVQZ
  actions:
    - title: RSS
      url: https://opera.opengeos.org/rss.xml
  template: book-theme
  parts:
    primary_sidebar_footer: '![](logo.png)'
